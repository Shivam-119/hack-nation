<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox · VC Brain</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>

<nav class="nav">
    <div class="nav__inner">
        <div class="nav__brand"><span>VC</span> Brain</div>
        <div class="nav__links">
            <a class="nav__link" href="/inbox" aria-current="page">Inbox</a>
            <a class="nav__link" href="/investor">Criteria</a>
            <a class="nav__link" href="/apply">Apply</a>
            <a class="nav__link" href="/">Dashboard</a>
        </div>
        <div class="nav__spacer"><span class="mock-flag" id="mockFlag" hidden>mock data</span></div>
    </div>
</nav>

<div class="container">
    <div class="page-head">
        <h1>Inbox</h1>
        <p>Every application, inbound and sourced. The flag says whether it is worth your
           attention — and if not, which check it failed.</p>
    </div>

    <div class="toolbar">
        <button class="filter" data-filter="all" aria-pressed="true">All</button>
        <button class="filter" data-filter="in_scope" aria-pressed="false">In scope</button>
        <button class="filter" data-filter="out_of_scope" aria-pressed="false">Out of scope</button>
        <button class="filter" data-filter="not_viable" aria-pressed="false">Not viable</button>
        <span class="toolbar__spacer"></span>
        <span id="count" class="mono" style="font-size:13px;color:var(--faint);"></span>
    </div>

    <div class="card" style="padding:20px 8px;">
        <div id="body">
            <div class="empty"><div class="empty__body">Loading…</div></div>
        </div>
    </div>
</div>

<script type="module">
import { listApplications, VERDICT, TREND, scoreClass, fmtDate, esc, USE_MOCK } from '/static/api.js';

if (USE_MOCK) document.getElementById('mockFlag').hidden = false;

let apps = [];
let filter = 'all';

function axisChips(s) {
    if (!s) return '<span class="table__sub">Not screened</span>';
    const one = (label, axis) => `<span class="chip chip--${scoreClass(axis.score)}"
        title="${esc(label)} · ${esc(axis.sentiment)} · trend ${esc(axis.trend)}">${label} ${Math.round(axis.score)} ${TREND[axis.trend] || ''}</span>`;
    return `<span style="display:inline-flex;gap:4px;flex-wrap:wrap;">
        ${one('F', s.founder_axis)}${one('M', s.market_axis)}${one('I', s.idea_vs_market_axis)}
    </span>`;
}

function render() {
    const rows = apps.filter(a => filter === 'all' || a.applicability.verdict === filter);
    const el = document.getElementById('body');

    document.getElementById('count').textContent =
        `${rows.length} of ${apps.length}`;

    if (!rows.length) {
        el.innerHTML = `<div class="empty">
            <div class="empty__title">Nothing here</div>
            <div class="empty__body">No applications match this filter.</div>
        </div>`;
        return;
    }

    el.innerHTML = `<table class="table">
        <thead><tr>
            <th>Company</th>
            <th class="table__hide-sm">Sector · Stage</th>
            <th>Applicability</th>
            <th>Screening</th>
            <th class="table__hide-sm">Submitted</th>
            <th></th>
        </tr></thead>
        <tbody>${rows.map(a => {
            const v = VERDICT[a.applicability.verdict] || VERDICT.out_of_scope;
            return `<tr>
                <td>
                    <div class="table__co">${esc(a.company_name)}</div>
                    <div class="table__sub">${esc(a.one_liner || '')}</div>
                </td>
                <td class="table__hide-sm">
                    <div>${esc(a.sector || '—')}</div>
                    <div class="table__sub mono">${esc(a.stage || '')}</div>
                </td>
                <td><span class="pill ${v.cls}">${v.label}</span></td>
                <td>${axisChips(a.screening)}</td>
                <td class="table__hide-sm mono table__sub">${fmtDate(a.submitted_at)}</td>
                <td style="text-align:right;"><a class="btn btn--ghost btn--sm" href="/inbox/${esc(a.id)}">Open</a></td>
            </tr>`;
        }).join('')}</tbody>
    </table>`;
}

document.querySelectorAll('.filter').forEach(b => {
    b.addEventListener('click', () => {
        filter = b.dataset.filter;
        document.querySelectorAll('.filter').forEach(x =>
            x.setAttribute('aria-pressed', String(x === b)));
        render();
    });
});

try {
    apps = await listApplications();
    render();
} catch (err) {
    document.getElementById('body').innerHTML = `<div class="empty">
        <div class="empty__title">Could not load applications</div>
        <div class="empty__body">${esc(err.message)}</div>
    </div>`;
}
</script>
</body>
</html>
