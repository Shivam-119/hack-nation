# Render blueprint — free single-service deploy (API + built frontend in one).
# Connect the repo in the Render dashboard, then set the three secret keys.
# Ephemeral disk is fine: the DB auto-seeds the demo apps on every startup.
services:
  - type: web
    name: vc-brain
    runtime: docker
    plan: free
    # Purpose-built and DB-free, unlike /api/thesis.
    healthCheckPath: /api/health
    envVars:
      # Secrets — set these in the Render dashboard (sync:false = not stored in git).
      - key: OPENAI_API_KEY
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      # Socials stay on mock ($0) -- Apify is pay-per-result and the founder
      # profile does not depend on it.
      - key: SOCIALS_TWITTER_PROVIDER
        value: mock
      - key: SOCIALS_LINKEDIN_PROVIDER
        value: mock
      - key: SOCIALS_IDENTITY_PROVIDER
        value: mock
      # Live web research: the founder profile (education, prior roles, prizes)
      # is only as good as this. Costs Tavily credits -- ~25 search angles per
      # founder plus ~14 for the company. Falls back to the bundled fixtures on
      # its own if TAVILY_API_KEY is unset, so a missing key degrades rather
      # than breaks.
      - key: REPUTATION_PROVIDER
        value: tavily
